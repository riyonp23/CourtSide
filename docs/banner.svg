<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#131b2e"/>
    </linearGradient>
    <linearGradient id="amber-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <pattern id="net" patternUnits="userSpaceOnUse" width="40" height="40">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#1a2237" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#1a2237" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#net)" opacity="0.35"/>

  <!-- Top accent line -->
  <rect x="0" y="105" width="1200" height="1.5" fill="url(#amber-line)" opacity="0.5"/>

  <!-- Main title -->
  <text x="600" y="180" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="82" letter-spacing="8">
    <tspan fill="#f59e0b">COURT</tspan><tspan fill="#ffffff">SIDE</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="224" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="20" fill="#94a3b8" letter-spacing="6">
    NCAA D1 MEN'S VOLLEYBALL ANALYTICS
  </text>

  <!-- Divider line -->
  <rect x="0" y="250" width="1200" height="1.5" fill="url(#amber-line)" opacity="0.5"/>

  <!-- Feature labels - top line (small muted) -->
  <text x="188" y="290" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="9" fill="#475569" letter-spacing="2">POWERED BY</text>
  <text x="438" y="290" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="9" fill="#475569" letter-spacing="2">INTERACTIVE</text>
  <text x="688" y="290" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="9" fill="#475569" letter-spacing="2">TRACKING</text>
  <text x="960" y="290" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="9" fill="#475569" letter-spacing="2">DATA PIPELINE</text>

  <!-- Feature values - bottom line (bold) -->
  <text x="188" y="310" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="15" fill="#f59e0b" letter-spacing="1">AI MATCH PREDICTOR</text>
  <text x="438" y="310" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600" font-size="15" fill="#e2e8f0" letter-spacing="1">LIVE ANALYTICS</text>
  <text x="688" y="310" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600" font-size="15" fill="#e2e8f0" letter-spacing="1">71 TEAMS · 329+</text>
  <text x="960" y="310" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600" font-size="15" fill="#e2e8f0" letter-spacing="1">REAL-TIME WEBSOCKET</text>

  <!-- Thin vertical dividers between features -->
  <line x1="318" y1="282" x2="318" y2="316" stroke="#1e293b" stroke-width="1"/>
  <line x1="563" y1="282" x2="563" y2="316" stroke="#1e293b" stroke-width="1"/>
  <line x1="823" y1="282" x2="823" y2="316" stroke="#1e293b" stroke-width="1"/>

  <!-- Season tag -->
  <text x="600" y="355" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="500" font-size="13" fill="#334155" letter-spacing="4">2025-26 SEASON</text>

  <!-- Decorative corner accents -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="1170" y1="30" x2="1120" y2="30" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="1170" y1="30" x2="1170" y2="80" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="30" y1="370" x2="80" y2="370" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="30" y1="370" x2="30" y2="320" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="1170" y1="370" x2="1120" y2="370" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="1170" y1="370" x2="1170" y2="320" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
</svg>
